
name: Update TVBox Source

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时执行一次
  workflow_dispatch: #手动执行

env:
  SOURCE_JSON_PATH: ./source/api.json
  TARGET_JSON_PATH: ./tvbox/api.json

jobs:
  update-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup directories
        run: |
          mkdir -p tvbox

      - name: Copy source to target directory
        run: |
          cp ${{ env.SOURCE_JSON_PATH }} ${{ env.TARGET_JSON_PATH }}

      - name: Update specific fields in target JSON
        run: |
          jq '.lives = (input | .lives)' ${{ env.TARGET_JSON_PATH }} < ${{ env.SOURCE_JSON_PATH }} > ./temp.json && mv ./temp.json ${{ env.TARGET_JSON_PATH }}
          jq '.parses = (input | .parses)' ${{ env.TARGET_JSON_PATH }} < ${{ env.SOURCE_JSON_PATH }} > ./temp.json && mv ./temp.json ${{ env.TARGET_JSON_PATH }}
          jq '.ads = (input | .ads)' ${{ env.TARGET_JSON_PATH }} < ${{ env.SOURCE_JSON_PATH }} > ./temp.json && mv ./temp.json ${{ env.TARGET_JSON_PATH }}

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto update TVBox source from local" || echo "No changes to commit"
          git push origin main
