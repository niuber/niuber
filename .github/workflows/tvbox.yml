
name: update TVBox

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync-resource:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SECRET_TVBOX }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: clean TVBoxOSC
        run: |
          # 清理旧文件
          rm -rf TVBoxOSC/* || echo "Directory TVBoxOSC does not exist or is empty"          

      - name: Download and Extract Resource
        run: |       
          curl -L "https://gh-proxy.org/https://github.com/PizazzGY/NewTVBox/raw/refs/heads/main/单线路.zip" -o temp.zip
          unzip -o temp.zip -d tvbox/
          rm temp.zip

      - name: Update API Configuration
        run: |
          node ./tvbox/update-config.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Sync TVBox resource and update config $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push